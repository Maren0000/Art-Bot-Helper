<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Art Bot Admin</title>

    <!-- Prevent flash: apply dark class before page renders -->
    <script>
        (function () {
            const saved = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (saved === 'dark' || (!saved && prefersDark)) {
                document.documentElement.classList.add('dark');
            }
        })();
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Poppins', 'system-ui', 'sans-serif'] }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #e8f9fb 0%, #ede8ff 55%, #d0f0f5 100%) fixed; }
        html.dark body { background: linear-gradient(135deg, #080015 0%, #1c0050 45%, #001e2e 100%) fixed; }

        /* Floating petal shapes */
        .petal {
            position: absolute;
            border-radius: 80% 0 80% 0;
            opacity: 0.18;
            animation: drift linear infinite;
            pointer-events: none;
        }
        @keyframes drift {
            0%   { transform: translateY(-60px) rotate(0deg); opacity: 0; }
            10%  { opacity: 0.18; }
            90%  { opacity: 0.12; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body class="h-full font-sans antialiased transition-colors duration-200 relative overflow-hidden bg-fixed">

<!-- Decorative floating petals (CSS-only, no images) -->
<div class="petal w-5 h-5 bg-cyan-400 dark:bg-cyan-500" style="left:8%;  animation-duration:12s; animation-delay:0s;  top:-40px"></div>
<div class="petal w-3 h-3 bg-violet-500 dark:bg-violet-600" style="left:22%; animation-duration:17s; animation-delay:3s;  top:-40px"></div>
<div class="petal w-6 h-6 bg-cyan-300 dark:bg-cyan-400" style="left:38%; animation-duration:14s; animation-delay:7s;  top:-40px"></div>
<div class="petal w-4 h-4 bg-purple-500 dark:bg-purple-600" style="left:55%; animation-duration:19s; animation-delay:1s;  top:-40px"></div>
<div class="petal w-3 h-3 bg-cyan-500 dark:bg-cyan-400" style="left:70%; animation-duration:13s; animation-delay:5s;  top:-40px"></div>
<div class="petal w-5 h-5 bg-violet-400 dark:bg-violet-500" style="left:85%; animation-duration:16s; animation-delay:9s;  top:-40px"></div>
<div class="petal w-4 h-4 bg-cyan-400 dark:bg-cyan-500" style="left:93%; animation-duration:11s; animation-delay:2s;  top:-40px"></div>

<!-- Radial glow blobs -->
<div class="absolute inset-0 pointer-events-none">
    <div class="absolute top-1/4 left-1/4 w-96 h-96 rounded-full"
         style="background: radial-gradient(circle, rgba(0,190,212,0.12) 0%, transparent 70%); transform: translate(-50%,-50%)"></div>
    <div class="absolute top-2/3 right-1/4 w-80 h-80 rounded-full"
         style="background: radial-gradient(circle, rgba(77,0,148,0.10) 0%, transparent 70%); transform: translate(50%,-50%)"></div>
</div>

<div class="relative min-h-full flex flex-col items-center justify-center px-4 py-12">

    <!-- Logo / brand -->
    <div class="flex items-center gap-3 mb-8">
        <div class="w-11 h-11 rounded-2xl flex items-center justify-center shrink-0"
             style="background: linear-gradient(135deg, #00bed4 0%, #4d0094 100%); box-shadow: 0 6px 20px rgba(0,190,212,0.35)">
            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
            </svg>
        </div>
        <div>
            <p class="text-base font-bold" style="background:linear-gradient(135deg,#00bed4,#4d0094);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">Art Bot</p>
            <p class="text-xs text-gray-500 dark:text-gray-400">Admin Panel</p>
        </div>
    </div>

    <!-- Card -->
    <div class="relative w-full max-w-sm rounded-2xl shadow-xl p-8
                bg-white/80 dark:bg-gray-900/80 backdrop-blur-md
                border border-pink-100/80 dark:border-purple-900/40">

        <!-- Top gradient accent line -->
        <div class="absolute top-0 left-8 right-8 h-0.5 rounded-full"
             style="background: linear-gradient(90deg, #00bed4, #4d0094, #00bed4)"></div>

        <h1 class="text-lg font-bold text-gray-900 dark:text-gray-100 mb-1">Sign in ✦</h1>
        <p class="text-sm text-gray-500 dark:text-gray-400 mb-6">Enter your credentials to continue.</p>

        {% if no_password %}
        <div class="flex items-start gap-3 px-4 py-3 rounded-xl bg-amber-50 dark:bg-amber-900/20 border border-amber-200 dark:border-amber-700/40 mb-6">
            <svg class="w-4 h-4 text-amber-600 dark:text-amber-400 shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
            </svg>
            <p class="text-sm text-amber-700 dark:text-amber-300">
                <span class="font-bold">No password set.</span>
                Add <code class="font-mono text-xs bg-amber-100 dark:bg-amber-900/40 px-1 py-0.5 rounded">ADMIN_PASSWORD</code>
                to your <code class="font-mono text-xs bg-amber-100 dark:bg-amber-900/40 px-1 py-0.5 rounded">.env</code> to enable login.
            </p>
        </div>
        {% endif %}

        {% if error %}
        <div class="flex items-center gap-3 px-4 py-3 rounded-xl bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-700/40 mb-5">
            <svg class="w-4 h-4 text-red-500 dark:text-red-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            <p class="text-sm text-red-600 dark:text-red-400">{{ error }}</p>
        </div>
        {% endif %}

        <form method="post" action="/login" class="space-y-4" {% if no_password %}style="pointer-events:none;opacity:0.5"{% endif %}>
            <input type="hidden" name="next" value="{{ next }}">

            <div>
                <label for="username" class="block text-xs font-bold text-gray-400 dark:text-gray-500 uppercase tracking-widest mb-1.5">
                    Username
                </label>
                <input id="username" type="text" name="username" autocomplete="username" autofocus
                       class="w-full px-3 py-2 text-sm rounded-xl transition-colors
                              border border-gray-200 dark:border-gray-700
                              bg-gray-50 dark:bg-gray-800
                              text-gray-900 dark:text-gray-100
                              placeholder-gray-400 dark:placeholder-gray-500
                              focus:bg-white dark:focus:bg-gray-800
                              focus:outline-none focus:ring-2 focus:border-transparent"
                       style="focus:ring-color: #f472b6"
                       onfocus="this.style.boxShadow='0 0 0 2px rgba(244,114,182,0.4)'"
                       onblur="this.style.boxShadow=''">
            </div>

            <div>
                <label for="password" class="block text-xs font-bold text-gray-400 dark:text-gray-500 uppercase tracking-widest mb-1.5">
                    Password
                </label>
                <input id="password" type="password" name="password" autocomplete="current-password"
                       class="w-full px-3 py-2 text-sm rounded-xl transition-colors
                              border border-gray-200 dark:border-gray-700
                              bg-gray-50 dark:bg-gray-800
                              text-gray-900 dark:text-gray-100
                              focus:bg-white dark:focus:bg-gray-800
                              focus:outline-none focus:ring-2 focus:border-transparent"
                       onfocus="this.style.boxShadow='0 0 0 2px rgba(244,114,182,0.4)'"
                       onblur="this.style.boxShadow=''">
            </div>

            <button type="submit"
                    class="w-full px-4 py-2.5 text-sm font-bold text-white rounded-xl transition-all mt-2
                           focus:outline-none focus:ring-2 focus:ring-pink-400 focus:ring-offset-2
                           dark:focus:ring-offset-gray-900"
                    style="background: linear-gradient(135deg, #00bed4 0%, #4d0094 100%); box-shadow: 0 4px 14px rgba(0,190,212,0.30)"
                    onmouseover="this.style.boxShadow='0 6px 20px rgba(0,190,212,0.45)'"
                    onmouseout="this.style.boxShadow='0 4px 14px rgba(0,190,212,0.30)'">
                Sign in
            </button>
        </form>
    </div>

    <!-- Theme toggle -->
    <button onclick="toggleTheme()"
            class="mt-6 flex items-center gap-2 text-xs text-gray-400 dark:text-gray-500 hover:text-pink-500 dark:hover:text-pink-400 transition-colors">
        <svg id="iconSun" class="w-3.5 h-3.5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M17.657 17.657l-.707-.707M6.343 6.343l-.707-.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
        </svg>
        <svg id="iconMoon" class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
        </svg>
        Toggle dark mode
    </button>
</div>

<script>
function toggleTheme() {
    const isDark = document.documentElement.classList.toggle('dark');
    localStorage.setItem('theme', isDark ? 'dark' : 'light');
    syncIcons(isDark);
}
function syncIcons(isDark) {
    document.getElementById('iconSun').classList.toggle('hidden', !isDark);
    document.getElementById('iconMoon').classList.toggle('hidden', isDark);
}
syncIcons(document.documentElement.classList.contains('dark'));
</script>

</body>
</html>
