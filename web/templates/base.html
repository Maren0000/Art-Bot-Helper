<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Art Bot Admin{% endblock %}</title>

    <!-- Prevent flash: apply dark class before page renders -->
    <script>
        (function () {
            const saved = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (saved === 'dark' || (!saved && prefersDark)) {
                document.documentElement.classList.add('dark');
            }
        })();
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Poppins', 'system-ui', 'sans-serif'] }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: #e8f9fb; }
        ::-webkit-scrollbar-thumb { background: #00bed4; border-radius: 4px; }
        .dark ::-webkit-scrollbar-track { background: #080015; }
        .dark ::-webkit-scrollbar-thumb { background: #4d0094; }
        dialog::backdrop { background: rgba(5,0,20,0.70); backdrop-filter: blur(4px); }

        /* Gradient text utility */
        .grad-text {
            background: linear-gradient(135deg, #00bed4, #4d0094);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Page background — attachment:fixed keeps gradient pinned to viewport while scrolling */
        body { background: linear-gradient(135deg, #e8f9fb 0%, #ede8ff 55%, #d0f0f5 100%) fixed; }
        html.dark body { background: linear-gradient(135deg, #080015 0%, #1c0050 45%, #001e2e 100%) fixed; }

        /* Sidebar shimmer decoration */
        .sidebar-glow::before {
            content: '';
            position: absolute;
            top: -60px;
            left: -30px;
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(244,114,182,0.12) 0%, transparent 70%);
            pointer-events: none;
        }
    </style>
</head>
<body class="h-full font-sans antialiased transition-colors duration-200 bg-fixed">
<div class="flex h-full min-h-screen">

    <!-- Sidebar (dark glass overlay on top of the page gradient) -->
    <aside class="fixed inset-y-0 left-0 w-56 flex flex-col z-40 overflow-hidden
                  bg-black/40 dark:bg-black/50 backdrop-blur-xl
                  border-r border-white/5">

        <!-- Subtle top glow blob -->
        <div class="absolute -top-10 -left-6 w-36 h-36 rounded-full pointer-events-none"
             style="background: radial-gradient(circle, rgba(0,190,212,0.12) 0%, transparent 70%)"></div>

        <!-- Brand -->
        <div class="relative flex items-center gap-3 px-5 py-5 border-b border-white/5">
            <!-- Gradient icon -->
            <div class="w-9 h-9 rounded-xl flex items-center justify-center shrink-0 shadow-lg"
                 style="background: linear-gradient(135deg, #00bed4 0%, #4d0094 100%); box-shadow: 0 4px 14px rgba(0,190,212,0.30)">
                <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                </svg>
            </div>
            <div class="min-w-0">
                <p class="text-sm font-bold text-white tracking-wide">Art Bot</p>
                <p class="text-xs" style="color: rgba(0,190,212,0.65)">Admin Panel</p>
            </div>
            <!-- Sparkle decoration -->
            <span class="absolute right-4 top-4 text-pink-400/30 text-lg select-none pointer-events-none">✦</span>
        </div>

        <!-- Nav -->
        <nav class="flex-1 px-3 py-4 space-y-0.5">
            <p class="px-3 mb-2 text-xs font-bold text-cyan-400/40 uppercase tracking-widest">Database</p>
            <a href="/images"
               class="flex items-center gap-2.5 px-3 py-2 rounded-xl text-sm font-medium transition-all
                      {% if active_page == 'images' %}
                      text-white shadow-md
                      {% else %}
                      text-gray-400 hover:text-white hover:bg-white/5
                      {% endif %}"
               {% if active_page == 'images' %}
               style="background: linear-gradient(90deg, rgba(0,190,212,0.70) 0%, rgba(77,0,148,0.85) 100%); box-shadow: 0 2px 10px rgba(0,190,212,0.20)"
               {% endif %}>
                <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                </svg>
                Images
            </a>

            <p class="px-3 pt-4 mb-2 text-xs font-bold text-cyan-400/40 uppercase tracking-widest">Config</p>
            <a href="/configs"
               class="flex items-center gap-2.5 px-3 py-2 rounded-xl text-sm font-medium transition-all
                      {% if active_page == 'configs' %}
                      text-white shadow-md
                      {% else %}
                      text-gray-400 hover:text-white hover:bg-white/5
                      {% endif %}"
               {% if active_page == 'configs' %}
               style="background: linear-gradient(90deg, rgba(0,190,212,0.70) 0%, rgba(77,0,148,0.85) 100%); box-shadow: 0 2px 10px rgba(0,190,212,0.20)"
               {% endif %}>
                <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                </svg>
                Maps &amp; Config
            </a>
        </nav>

        <!-- DB path + bottom sparkle -->
        <div class="relative px-5 py-4 border-t border-white/5">
            <span class="absolute right-4 bottom-3 text-violet-400/20 text-sm select-none pointer-events-none">✧</span>
            <p class="text-xs text-gray-600 truncate" title="{{ db_path }}">{{ db_path }}</p>
        </div>
    </aside>

    <!-- Content -->
    <div class="flex-1 ml-56 flex flex-col min-h-screen">
        <!-- Top bar -->
        <header class="sticky top-0 z-30 px-8 py-3.5 flex items-center justify-between
                       bg-white/60 dark:bg-black/30 backdrop-blur-xl
                       border-b border-white/20 dark:border-white/5">
            <h1 class="text-base font-bold text-gray-900 dark:text-gray-100">{% block page_title %}{% endblock %}</h1>

            <div class="flex items-center gap-2">
            <!-- Logout -->
            <form method="post" action="/logout">
                <button type="submit"
                        class="flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium rounded-xl transition-colors
                               text-gray-500 dark:text-gray-400 hover:text-cyan-600 dark:hover:text-cyan-400
                               hover:bg-cyan-50 dark:hover:bg-cyan-900/20">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                    </svg>
                    Sign out
                </button>
            </form>

            <!-- Theme toggle -->
            <button id="themeToggle" onclick="toggleTheme()"
                    class="w-8 h-8 flex items-center justify-center rounded-xl text-gray-500 dark:text-gray-400
                           hover:bg-cyan-50 dark:hover:bg-cyan-900/20
                           hover:text-cyan-600 dark:hover:text-cyan-400 transition-colors"
                    title="Toggle dark mode">
                <!-- Sun (shown in dark mode) -->
                <svg id="iconSun" class="w-4 h-4 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M17.657 17.657l-.707-.707M6.343 6.343l-.707-.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
                </svg>
                <!-- Moon (shown in light mode) -->
                <svg id="iconMoon" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
                </svg>
            </button>
            </div>
        </header>

        <!-- Page body -->
        <main class="flex-1 px-8 py-6">
            {% block content %}{% endblock %}
        </main>
    </div>
</div>

<!-- Delete confirmation dialog -->
<dialog id="deleteDialog" class="rounded-2xl shadow-2xl border-0 p-0 w-full max-w-sm
                                  bg-white dark:bg-gray-800">
    <div class="p-6">
        <div class="flex items-start gap-4 mb-5">
            <div class="w-10 h-10 rounded-full bg-red-100 dark:bg-red-900/40 flex items-center justify-center shrink-0 mt-0.5">
                <svg class="w-5 h-5 text-red-500 dark:text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                </svg>
            </div>
            <div>
                <h3 class="text-sm font-bold text-gray-900 dark:text-gray-100">Delete image record</h3>
                <p class="mt-1 text-sm text-gray-500 dark:text-gray-400">
                    Are you sure you want to delete record
                    <span id="deleteId" class="font-mono font-semibold text-gray-800 dark:text-gray-200"></span>?
                    This cannot be undone.
                </p>
            </div>
        </div>
        <div class="flex gap-2 justify-end">
            <button onclick="document.getElementById('deleteDialog').close()"
                    class="px-4 py-2 text-sm font-medium text-gray-700 dark:text-gray-300
                           bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600
                           rounded-xl transition-colors">
                Cancel
            </button>
            <form id="deleteForm" method="post">
                <button type="submit"
                        class="px-4 py-2 text-sm font-medium text-white bg-red-500 hover:bg-red-600 rounded-xl transition-colors">
                    Delete
                </button>
            </form>
        </div>
    </div>
</dialog>

<script>
function confirmDelete(id) {
    document.getElementById('deleteId').textContent = '#' + id;
    document.getElementById('deleteForm').action = '/images/' + id + '/delete';
    document.getElementById('deleteDialog').showModal();
}

function toggleTheme() {
    const isDark = document.documentElement.classList.toggle('dark');
    localStorage.setItem('theme', isDark ? 'dark' : 'light');
    syncIcons(isDark);
}

function syncIcons(isDark) {
    document.getElementById('iconSun').classList.toggle('hidden', !isDark);
    document.getElementById('iconMoon').classList.toggle('hidden', isDark);
}

// Sync icons on load to match whatever class was applied in <head>
syncIcons(document.documentElement.classList.contains('dark'));

// ---------------------------------------------------------------------------
// Live search: fetch-based, no page reload.
// Forms with [data-live-search] trigger a fetch on input/change.
// The server returns the full page; we swap only [data-live-content].
// Links & forms inside [data-live-content] are also intercepted.
// ---------------------------------------------------------------------------
(function () {
    var liveContent = document.querySelector('[data-live-content]');
    if (!liveContent) return;

    function debounce(fn, ms) {
        var t; return function () { clearTimeout(t); t = setTimeout(fn, ms); };
    }

    function replaceContent(url) {
        return fetch(url)
            .then(function (r) { return r.text(); })
            .then(function (html) {
                var doc = new DOMParser().parseFromString(html, 'text/html');
                var fresh = doc.querySelector('[data-live-content]');
                if (fresh) {
                    liveContent.innerHTML = fresh.innerHTML;
                    history.replaceState(null, '', url);
                }
            });
    }

    function buildUrl(form) {
        var qs = new URLSearchParams(new FormData(form)).toString();
        return form.action + (qs ? '?' + qs : '');
    }

    // --- Bind search forms -------------------------------------------------
    document.querySelectorAll('[data-live-search]').forEach(function (form) {
        var search = debounce(function () { replaceContent(buildUrl(form)); }, 300);
        form.addEventListener('submit', function (e) { e.preventDefault(); replaceContent(buildUrl(form)); });
        form.querySelectorAll('input[type="text"]').forEach(function (el) {
            el.addEventListener('input', search);
        });
        form.querySelectorAll('select').forEach(function (el) {
            el.addEventListener('change', function () { replaceContent(buildUrl(form)); });
        });

        // [data-live-clear] buttons reset the form and re-fetch
        form.querySelectorAll('[data-live-clear]').forEach(function (btn) {
            btn.addEventListener('click', function (e) {
                e.preventDefault();
                form.querySelectorAll('input[type="text"]').forEach(function (el) { el.value = ''; });
                form.querySelectorAll('select').forEach(function (el) { el.selectedIndex = 0; });
                replaceContent(buildUrl(form));
            });
        });
    });

    // --- Intercept link clicks inside the results (pagination, etc.) -------
    liveContent.addEventListener('click', function (e) {
        var link = e.target.closest('a');
        if (link && link.href && !link.target) {
            e.preventDefault();
            replaceContent(link.href);
        }
    });

    // --- Intercept form POSTs inside the results (config delete, etc.) -----
    liveContent.addEventListener('submit', function (e) {
        if (e.defaultPrevented) return;
        var form = e.target.closest('form');
        if (!form) return;
        e.preventDefault();
        fetch(form.action, {
            method: 'POST',
            body: new URLSearchParams(new FormData(form)),
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        }).then(function () { replaceContent(location.pathname + location.search); });
    });

    // --- Make the image-delete dialog also dynamic -------------------------
    var deleteForm = document.getElementById('deleteForm');
    if (deleteForm) {
        deleteForm.addEventListener('submit', function (e) {
            e.preventDefault();
            fetch(deleteForm.action, {
                method: 'POST',
                body: new URLSearchParams(new FormData(deleteForm)),
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            }).then(function () {
                document.getElementById('deleteDialog').close();
                replaceContent(location.pathname + location.search);
            });
        });
    }
}());
</script>

{% block scripts %}{% endblock %}
</body>
</html>
